name: Issue PR Linkback

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - closed

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  linkback:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            const source = [pr.title || "", pr.body || ""].join("\n");
            const refs = new Set();

            const closingRe = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            let m;
            while ((m = closingRe.exec(source)) !== null) {
              refs.add(Number(m[1]));
            }

            // Fallback: allow plain issue mentions in the PR body/title.
            const mentionRe = /#(\d+)/g;
            while ((m = mentionRe.exec(source)) !== null) {
              refs.add(Number(m[1]));
            }

            const issueNumbers = Array.from(refs).filter((n) => Number.isInteger(n) && n > 0 && n !== pr.number);
            if (issueNumbers.length === 0) {
              core.notice("No linked issues found in PR title/body.");
              return;
            }

            const marker = `<!-- governance-ci:pr-linkback pr:${pr.number} -->`;

            let statusLine = "Update: a pull request is in progress for this issue.";
            if (action === "closed" && pr.merged) {
              statusLine = "Update: linked pull request was merged.";
            } else if (action === "closed" && !pr.merged) {
              statusLine = "Update: linked pull request was closed without merge.";
            } else if (action === "synchronize") {
              statusLine = "Update: linked pull request received new commits.";
            } else if (action === "ready_for_review") {
              statusLine = "Update: linked pull request is ready for review.";
            }

            const actor = context.actor;
            const body = [
              marker,
              "Governance CI linkback:",
              "",
              statusLine,
              `PR: #${pr.number} (${pr.title || "untitled"})`,
              `Author: @${actor}`,
              `URL: ${pr.html_url}`,
              "",
              "If this PR is not the intended fix path, leave a comment and retag scope.",
            ].join("\n");

            for (const issue_number of issueNumbers) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find((c) => (c.body || "").includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            }
