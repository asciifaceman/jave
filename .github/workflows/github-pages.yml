name: Orcal Pages

on:
  push:
    branches:
      - main
    paths:
      - governance/**
      - docs/**
      - specs/**
      - examples/**
      - site/**
      - tools/build-pages-content.sh
      - .github/workflows/github-pages.yml
  pull_request:
    paths:
      - governance/**
      - docs/**
      - specs/**
      - examples/**
      - site/**
      - tools/build-pages-content.sh
      - .github/workflows/github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pages content
        run: bash ./tools/build-pages-content.sh

      - name: Build with Jekyll (validation)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pages content
        run: bash ./tools/build-pages-content.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
