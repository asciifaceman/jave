name: Issue Triage

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Label and respond
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const title = (issue.title || "").toLowerCase();
            const body = (issue.body || "").toLowerCase();
            const text = `${title}\n${body}`;

            const labels = new Set(["triage"]);
            const has = (re) => re.test(text);

            if (has(/\bbug\b|\bcrash\b|\bpanic\b|\berror\b|\bfail(ed|ure)?\b|\bregression\b/)) labels.add("bug");
            if (has(/\bproposal\b|\brfc\b|\bfeature\b|\benhancement\b|\bidea\b/)) labels.add("enhancement");
            if (has(/\bdocs?\b|\breadme\b|\bguide\b|\btypo\b|\bdocumentation\b/)) labels.add("documentation");
            if (has(/\bquestion\b|\bhow do i\b|\bhelp\b|\busage\b/)) labels.add("question");

            const missingBody = !(issue.body || "").trim();
            if (missingBody) labels.add("needs-info");

            const labelColors = {
              triage: "1d76db",
              bug: "d73a4a",
              enhancement: "a2eeef",
              documentation: "0075ca",
              question: "d876e3",
              "needs-info": "fbca04",
            };

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label,
                    color: labelColors[label] || "ededed",
                  });
                }
              }
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: Array.from(labels),
              });
            } catch (err) {
              core.warning(`labeling failed: ${err.message}`);
            }

            const checklist = [
              "Please include the exact command you ran.",
              "Include expected behavior vs actual behavior.",
              "For diagnostics issues, include the full diagnostic output.",
              "If possible, include a minimal `.jave` reproduction snippet.",
              "When opening a PR for this issue, include `Fixes #" + issue_number + "` in the PR title or body.",
            ];

            const bodyLines = [
              "Governance CI triage: issue received and queued for review.",
              "",
              "Applied labels: " + Array.from(labels).map((l) => `\`${l}\``).join(", "),
              "",
              "To speed up review, please provide:",
              ...checklist.map((line) => `- ${line}`),
              "",
              "Review policy reference: `.github/instructions/05-GitHub-Governance.instructions.md`",
            ];

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: bodyLines.join("\n"),
            });
